# Dialog configuration for Space Hulks
# All dialog text is loaded at startup and referenced by key.
# Lines are indexed: key.line0, key.line1, etc.
# Max 4 lines per dialog, 70 chars per line.

# ── Opening teletype sequence ──────────────────────────────────

intro:
  line0: TERRAN SCIENCE VESSEL "ENDEAVOR"
  line1: MISSION LOG - DAY 1
  line2: _
  line3: DRAKE'S VOID. A REGION OF SPACE DISCOVERED
  line4: ONLY THREE CYCLES AGO. RICH IN RESOURCES.
  line5: DOZENS OF COLONIES ESTABLISHED WITHIN MONTHS.
  line6: _
  line7: THEN THE SPORES CAME.
  line8: _
  line9: A DRAGON-LIKE PARASITE. ORIGIN UNKNOWN.
  line10: IT INFECTS ENTIRE WORLDS, TWISTING LIFE
  line11: INTO SOMETHING HOSTILE. SOMETHING HUNGRY.
  line12: _
  line13: COLONY AFTER COLONY HAS GONE DARK.
  line14: IF THE SPORES REACH THE OUTER CLUSTERS
  line15: CONTAINMENT WILL BE IMPOSSIBLE.
  line16: _
  line17: THE ENDEAVOR HAS BEEN DISPATCHED TO COLLECT
  line18: BIOMASS FROM INFECTED VESSELS.
  line19: OUR MISSION - DEVELOP A VACCINE BEFORE
  line20: DRAKE'S VOID CONSUMES EVERYTHING.
  line21: _
  line22: WE HAVE ARRIVED AT OUR FIRST TARGET.
  line23: A DERELICT SHIP. DRIFTING AND SILENT.
  line24: _
  line25: REPORT TO YOUR CREW FOR BRIEFING.
  count: 26

# ── Crew initial dialogs (new game, before captain briefing) ───

crew_init:
  kowalski:
    line0: FIRST TIME IN DRAKE'S VOID. PLACE GIVES ME THE CREEPS.
    line1: YOU SHOULD TALK TO THE CAPTAIN.
    count: 2
  reyes:
    line0: TELEPORTER IS CALIBRATED. BUT DON'T JUMP IN BLIND.
    line1: GET YOUR BRIEFING FIRST.
    count: 2
  chen:
    line0: I'VE GOT YOUR LOADOUT READY.
    line1: BUT CHECK IN WITH THE CAP BEFORE YOU GEAR UP.
    count: 2
  vasquez:
    line0: THESE SPORE READINGS ARE OFF THE CHARTS. BE CAREFUL.
    line1: SEE THE CAPTAIN WHEN YOU CAN.
    count: 2

# ── Captain mission briefing (multi-page) ──────────────────────

captain_briefing:
  page0:
    line0: WELCOME ABOARD THE ENDEAVOR. WE'VE GOT A DERELICT AHEAD.
    line1: INFECTED. CRAWLING WITH HOSTILES.
    count: 2
  page1:
    line0: WE NEED BIOMASS FROM INSIDE. KILL EVERYTHING OR BLOW
    line1: THEIR TERMINALS. FIRST SEE DR VASQUEZ IN THE MEDBAY.
    count: 2
  page2:
    line0: THEN GRAB YOUR GEAR FROM CHEN IN THE ARMORY.
    line1: AFTER THAT HEAD TO THE TELEPORTER.
    count: 2
  pages: 3

# ── Post-briefing crew dialogs (after talking to captain) ──────

crew_post_briefing:
  vasquez:
    line0: CAPTAIN SENT YOU? GOOD. LET ME RUN A QUICK SCAN...
    line1: YOU'RE CLEAR. VITALS LOGGED.
    count: 2
  chen:
    line0: DOC CLEARED YOU? GOOD. HERE'S YOUR STANDARD KIT.
    line1: PICK ANYTHING ELSE YOU NEED.
    count: 2
  reyes_ready:
    line0: ALL CHECKED OUT? GOOD. STEP ON THE PAD.
    line1: I'LL BEAM YOU TO THAT DERELICT.
    count: 2
  reyes_blocked:
    line0: HOLD UP. YOU'RE NOT CLEARED. FINISH YOUR PREP FIRST.
    line1: CAPTAIN'S ORDERS.
    count: 2

# ── Captain dialogs (after first mission and ongoing) ──────────

captain:
  pre_mission:
    line0: WE CAN'T JUMP YET. INVESTIGATE THAT DERELICT FIRST.
    line1: WE NEED THAT BIOMASS.
    count: 2
  post_mission:
    line0: GOOD WORK OUT THERE. WE'VE GOT WHAT WE NEED.
    line1: WE'RE READY FOR THE NEXT STAR SYSTEM. PLOT A COURSE.
    count: 2
  under_attack:
    line0: WE'RE UNDER ATTACK! BOARD THAT SHIP AND STRIP IT FOR
    line1: BIOMASS. KILL EVERYTHING OR DESTROY THEIR TERMINALS!
    count: 2
  neutralized:
    line0: ENEMY NEUTRALIZED. WE'RE READY TO JUMP.
    line1: HEAD TO THE STAR MAP.
    count: 2

# ── Default crew dialogs (used after initial mission flow) ─────

crew_default:
  reyes:
    line0: TELEPORTER IS PRIMED. STEP ON THE PAD WHEN
    line1: YOU'RE READY FOR ACTION.
    count: 2
  chen:
    line0: GOT SOME NEW GEAR. TAKE A LOOK AT WHAT I'VE SCROUNGED UP.
    count: 1
  kowalski:
    line0: ANOTHER DAY IN SPACE. AT LEAST WE'RE STILL BREATHING RIGHT?
    count: 1
  vasquez:
    line0: I'VE BEEN STUDYING THE BIOMASS YOU BROUGHT BACK.
    line1: I CAN SYNTHESIZE SOME ELEMENTAL COMPOUNDS FOR YOU.
    count: 2

# ── Mission objectives ─────────────────────────────────────────

objectives:
  obj0: REPORT TO CAPTAIN
  obj1: REPORT TO MEDBAY
  obj2: VISIT THE ARMORY
  count: 3

# ── Game over epilogue (player loses) ─────────────────────────

epilogue_loss:
  line0: THE ISS ENDEAVOR WAS LOST WITH ALL HANDS.
  line1: _
  line2: WITHOUT THE BIOMASS DATA THE CREW
  line3: CARRIED THE SPORES SPREAD UNCHECKED
  line4: ACROSS DRAKE'S VOID.
  line5: _
  line6: WORLD LEADERS RESORTED TO DESPERATE
  line7: MEASURES. ENTIRE SOLAR SYSTEMS WERE
  line8: QUARANTINED. OTHERS WERE NUKED FROM
  line9: ORBIT TO PREVENT FURTHER INFECTION.
  line10: _
  line11: IT WAS NOT ENOUGH.
  line12: _
  line13: THE PARASITE REACHED THE OUTER CLUSTERS
  line14: WITHIN A SINGLE CYCLE. COLONY AFTER
  line15: COLONY FELL SILENT.
  line16: _
  line17: A DARK AGE DESCENDED UPON THE GALAXY.
  line18: TRADE ROUTES COLLAPSED. GOVERNMENTS
  line19: FRACTURED. BILLIONS WERE LEFT TO FEND
  line20: FOR THEMSELVES IN QUARANTINE ZONES.
  line21: _
  line22: THE ENDEAVOR'S MISSION WAS HUMANITY'S
  line23: BEST CHANCE. THAT CHANCE IS GONE.
  count: 24

# ── Victory epilogue (all 3 samples collected) ────────────────

epilogue_win:
  line0: SAMPLE EXTRACTION COMPLETE.
  line1: _
  line2: YOU'VE OBTAINED THE FIRST RARE SAMPLE.
  line3: _
  line4: YOU ARE CLOSER TO DEVELOPING A VACCINE.
  line5: MORE OF THESE SUPER BEINGS ARE REQUIRED
  line6: TO DEVELOP THE VACCINE.
  line7: _
  line8: YOUR CREW FINDS A RENEWED SENSE OF HOPE.
  line9: _
  line10: BUT DIVING DEEPER INTO THE NEBULA
  line11: WILL NOT BE FOR THE FAINT OF HEART.
  line12: _
  line13: _
  line14: (MORE CONTENT COMING SOON.....)
  line15: _
  line16: THANK YOU FOR PLAYING THE DEMO.
  count: 17

# ── Captain dialog between star maps (after boss) ─────────────

# ── Kowalski progressive stress dialog ────────────────────────

kowalski:
  stress0:
    line0: HEY. YOU GOOD?
    line1: I KEEP HEARING NOISES IN THE WALLS.
    line2: PROBABLY JUST THE SHIP SETTLING... RIGHT?
    count: 3
  stress1:
    line0: MAN... THESE DERELICTS ARE GETTING WORSE.
    line1: EVERY TIME YOU GO OUT THERE YOU COME BACK WITH MORE SCARS.
    line2: I DON'T KNOW HOW MUCH MORE OF THIS I CAN TAKE.
    count: 3
  stress2:
    line0: I CAN'T SLEEP ANYMORE.
    line1: EVERY TIME I CLOSE MY EYES I SEE THOSE THINGS.
    line2: WE'RE NOT MAKING IT OUT OF HERE ARE WE?
    count: 3
  stress3:
    line0: I'M FREAKIN OUT MAAAN!!!
    line1: DID YOU SEE WHAT'S OUT THERE?! THAT THING IS HUGE!
    line2: WE'RE ALL GONNA DIE IN THIS STUPID VOID!
    count: 3

# ── By-Tor progressive dialog (friendly alien, Kowalski's best friend) ──

bytor:
  init:
    line0: KOWALSKI SAYS YOU ARE THE ONE WHO WILL SAVE US.
    line1: FIREMANN BELIEVES THIS. YES YES.
    count: 3
  default0:
    line0: THE STARS OUT HERE ARE DIFFERENT FROM MY HOME.
    line1: BUT YOUR CREW... THEY FEEL LIKE FAMILY NOW.
    line2: KOWALSKI TAUGHT ME THAT WORD. FAMILY.
    count: 3
  default1:
    line0: MORE DERELICTS. MORE DANGER.
    line1: BUT FIREMANN IS NOT AFRAID! WE HAVE GOOD TEAM.
    line2: KOWALSKI AND I WILL KEEP SPIRITS HIGH. YOU FOCUS ON FIGHT.
    count: 3
  default2:
    line0: FIREMANN CAN FEEL IT... THE HIVE IS CLOSE.
    line1: THE AIR TASTES DIFFERENT. ELECTRIC.
    line2: BUT WE HAVE COME TOO FAR TO TURN BACK NOW. TOGETHER WE ARE STRONG.
    count: 3
  pre_boss:
    line0: KOWALSKI IS SCARED. FIREMANN IS SCARED TOO.
    line1: BUT SCARED IS OK. SCARED MEANS WE STILL HAVE SOMETHING TO LOSE.
    line2: GO GET THAT SAMPLE. WE BELIEVE IN YOU.
    count: 4

captain_sample:
  sample1:
    line0: FIRST BIOMASS HAUL SECURED. GOOD WORK. BUT WE NEED MORE.
    line1: PLOTTING COURSE TO THE NEXT SECTOR.
    count: 2
  sample2:
    line0: TWO DOWN. ONE TO GO. THE SPORES ARE GETTING WORSE.
    line1: LET'S FINISH THIS.
    count: 2
  sample3:
    line0: ALL THREE BIOMASS SAMPLES ACQUIRED. TRANSMITTING DATA NOW.
    line1: YOU DID IT. YOU SAVED US ALL.
    count: 2
