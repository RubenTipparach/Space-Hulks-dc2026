# Hub ship lighting & rendering configuration

# Ambient lighting override (replaces dungeon ambient during hub rendering)
ambient:
  brightness: 0.1           # base ambient level (0=dark, 1=full bright)

# Player torch (carried light in hub) - currently not used
torch:
  brightness: 0.1         # torch intensity in hub (lower = more ambient-lit feel)

# Depth fog (distance-based brightness falloff from player)
fog:
  base: 0.15                 # minimum brightness at any distance
  boost: 0.75               # extra brightness added near the player
  near: 2.0                 # distance (cells) within which full boost applies
  falloff: 4.0              # distance (cells) over which boost fades to zero

# Room ceiling lights (same system as dungeon room lights)
room_light:
  color: [1.0, 1.0, 1.0]    # RGB normalized (white)
  brightness: 0.4            # intensity multiplier
  radius: 6.0               # falloff radius in world units

# Draw distance (max cells rendered from player, max 20)
draw_distance: 16
