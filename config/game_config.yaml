# Game configuration for Drake's Void
# Edit these values to tweak gameplay settings.

debug:
  enabled: 1

# Movement mode: 0 = smooth (step must resolve before next), 1 = instant (spam-friendly)
movement:
  instant_step: 1

# Hub ship as seen from enemy ship (south of player)
# One config per enemy ship size (hub looks different depending on where you are)
hub_from_small:
  x_offset: 0.0
  y_offset: -2.0
  z_offset: 35.0
  hover_amplitude: 0.2
  hover_speed: 0.8

hub_from_medium:
  x_offset: 0.0
  y_offset: -2.0
  z_offset: 60.0
  hover_amplitude: 0.2
  hover_speed: 0.8

hub_from_large:
  x_offset: 0.0
  y_offset: -2.0
  z_offset: 80.0
  hover_amplitude: 0.15
  hover_speed: 0.6

# Enemy ship position relative to hub (in world units)
# Small ship (20x20)
enemy_ship_small:
  x_offset: 0.0
  y_offset: -2.0
  z_offset: -40.0
  hover_amplitude: 0.3
  hover_speed: 1.0

# Medium ship (40x40)
enemy_ship_medium:
  x_offset: 0.0
  y_offset: -12.0
  z_offset: -60.0
  hover_amplitude: 0.2
  hover_speed: 0.4

# Combat scene lighting
# Ground plane uses the dungeon floor texture with palette-based shading.
# Point light illuminates the floor from a configurable position.
combat:
  ground_ambient: 0.05
  light_x: 0.0
  light_y: 0.4
  light_intensity: 0.55
  light_radius: 0.42
  shadow_opacity: 0.55

# Large ship (80x80)
enemy_ship_large:
  x_offset: 0.0
  y_offset: -15.0
  z_offset: -120.0
  hover_amplitude: 0.15
  hover_speed: 0.3
